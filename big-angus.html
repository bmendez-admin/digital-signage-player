#p-gua-doble     { top: 700px;  left: 945px; }
#p-gua-combo     { top: 737px;  left: 770px; }
#p-gua-combo-d   { top: 737px;  left: 945px; }

#p-wes-burger    { top: 1205px; left: 230px; }
#p-wes-doble     { top: 1205px; left: 400px; }
#p-wes-combo     { top: 1242px; left: 230px; }
#p-wes-combo-d   { top: 1242px; left: 400px; }

#p-low-burger    { top: 1098px; left: 668px; }
#p-low-doble     { top: 1098px; left: 848px; }
#p-low-combo     { top: 1142px; left: 668px; }
#p-low-combo-d   { top: 1142px; left: 848px; }

#p-dia-burger    { top: 1718px; left: 130px; }
#p-dia-doble     { top: 1718px; left: 310px; }
#p-dia-combo     { top: 1762px; left: 130px; }
#p-dia-combo-d   { top: 1762px; left: 310px; }

#p-mon-burger    { top: 1718px; left: 668px; }
#p-mon-combo     { top: 1762px; left: 668px; }

#p-mediano       { top: 1862px; left: 790px; }
#p-grande        { top: 1862px; left: 960px; }

#status {
  display: none;
  position: fixed;
  inset: 0;
  background: #2a2a2a;
  color: #fff;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  text-align: center;
  z-index: 100;
}

.status-icon { font-size: 3em; margin-bottom: 20px; }

@keyframes price-flash {
  0%   { color: #ac0d24; transform: scale(1.2); }
  100% { color: #1a1a1a; transform: scale(1); }
}
.flash { animation: price-flash 0.6s ease-out; }
</style>
</head>
<body>

<div id="canvas">
  <div class="precio" id="p-ori-burger"  data-producto="7"  data-field="burger"><span class="sym">$</span><span class="val">149</span></div>
  <div class="precio" id="p-ori-doble"   data-producto="7"  data-field="doble"><span class="sym">$</span><span class="val">205</span></div>

  <div class="precio" id="p-gua-burger"  data-producto="8"  data-field="burger"><span class="sym">$</span><span class="val">169</span></div>
  <div class="precio" id="p-gua-doble"   data-producto="8"  data-field="doble"><span class="sym">$</span><span class="val">225</span></div>
  <div class="precio" id="p-gua-combo"   data-producto="8"  data-field="combo"><span class="sym">$</span><span class="val">239</span></div>
  <div class="precio" id="p-gua-combo-d" data-producto="8"  data-field="combo_doble"><span class="sym">$</span><span class="val">289</span></div>

  <div class="precio" id="p-wes-burger"  data-producto="9"  data-field="burger"><span class="sym">$</span><span class="val">159</span></div>
  <div class="precio" id="p-wes-doble"   data-producto="9"  data-field="doble"><span class="sym">$</span><span class="val">215</span></div>
  <div class="precio" id="p-wes-combo"   data-producto="9"  data-field="combo"><span class="sym">$</span><span class="val">229</span></div>
  <div class="precio" id="p-wes-combo-d" data-producto="9"  data-field="combo_doble"><span class="sym">$</span><span class="val">279</span></div>

  <div class="precio" id="p-low-burger"  data-producto="10" data-field="burger"><span class="sym">$</span><span class="val">139</span></div>
  <div class="precio" id="p-low-doble"   data-producto="10" data-field="doble"><span class="sym">$</span><span class="val">195</span></div>
  <div class="precio" id="p-low-combo"   data-producto="10" data-field="combo"><span class="sym">$</span><span class="val">209</span></div>
  <div class="precio" id="p-low-combo-d" data-producto="10" data-field="combo_doble"><span class="sym">$</span><span class="val">259</span></div>

  <div class="precio" id="p-dia-burger"  data-producto="11" data-field="burger"><span class="sym">$</span><span class="val">185</span></div>
  <div class="precio" id="p-dia-doble"   data-producto="11" data-field="doble"><span class="sym">$</span><span class="val">241</span></div>
  <div class="precio" id="p-dia-combo"   data-producto="11" data-field="combo"><span class="sym">$</span><span class="val">249</span></div>
  <div class="precio" id="p-dia-combo-d" data-producto="11" data-field="combo_doble"><span class="sym">$</span><span class="val">305</span></div>

  <div class="precio" id="p-mon-burger"  data-producto="12" data-field="burger"><span class="sym">$</span><span class="val">258</span></div>
  <div class="precio" id="p-mon-combo"   data-producto="12" data-field="combo"><span class="sym">$</span><span class="val">299</span></div>

  <div class="precio p-upgrade" id="p-mediano" data-upgrade="mediano"><span class="sym">$</span><span class="val">23</span></div>
  <div class="precio p-upgrade" id="p-grande"  data-upgrade="grande"><span class="sym">$</span><span class="val">27</span></div>
</div>

<div id="status">
  <div class="status-icon"></div>
  <div id="status-message">Conectando...</div>
</div>

<script>
var CONFIG = {
  url: 'https://gbklqpbcllhdixiuxwzt.supabase.co',
  key: 'sb_publishable_478TOeFf5POv09rZ58BeyQ_BA8rY8cf'
};

var params = new URLSearchParams(window.location.search);
var sucursalSlug = params.get('sucursal');
var plantillaSlug = params.get('plantilla');
var db = supabase.createClient(CONFIG.url, CONFIG.key);

function formatPrice(value) {
  if (value === null || value === undefined) return null;
  var num = parseFloat(value);
  return Number.isInteger(num) ? num.toString() : num.toFixed(2);
}

function showStatus(icon, message) {
  var el = document.getElementById('status');
  el.style.display = 'flex';
  el.querySelector('.status-icon').textContent = icon;
  el.querySelector('#status-message').textContent = message;
}

function hideStatus() {
  document.getElementById('status').style.display = 'none';
}

function handlePriceUpdate(payload) {
  var row = payload.new;
  var els = document.querySelectorAll('[data-producto-id="' + row.producto_id + '"]');
  els.forEach(function(el) {
    var field = el.dataset.field;
    if (row[field] === undefined || row[field] === null) return;
    var formatted = formatPrice(row[field]);
    var valEl = el.querySelector('.val');
    if (!valEl || valEl.textContent === formatted) return;
    valEl.textContent = formatted;
    el.classList.remove('flash');
    void el.offsetWidth;
    el.classList.add('flash');
  });
}

function handleUpgradeUpdate(payload) {
  var row = payload.new;
  var el = document.querySelector('[data-upgrade-id="' + row.id + '"]');
  if (!el) return;
  var formatted = formatPrice(row.precio);
  if (!formatted) return;
  el.querySelector('.val').textContent = formatted;
  el.classList.remove('flash');
  void el.offsetWidth;
  el.classList.add('flash');
}

async function init() {
  if (!sucursalSlug || !plantillaSlug) {
    showStatus('⚠️', 'URL incompleta. Formato: ?sucursal=SLUG&plantilla=SLUG');
    return;
  }

  showStatus('📡', 'Conectando...');

  var sucursalRes = await db.from('sucursales').select('id').eq('slug', sucursalSlug).single();
  if (sucursalRes.error || !sucursalRes.data) {
    showStatus('❌', 'Sucursal "' + sucursalSlug + '" no encontrada');
    return;
  }
  var sucursalId = sucursalRes.data.id;

  var plantillaRes = await db.from('plantillas').select('id, nombre').eq('slug', plantillaSlug).single();
  if (plantillaRes.error || !plantillaRes.data) {
    showStatus('❌', 'Plantilla "' + plantillaSlug + '" no encontrada');
    return;
  }
  var plantillaId = plantillaRes.data.id;
  document.title = plantillaRes.data.nombre + ' — ' + sucursalSlug;

  var productosRes = await db
    .from('productos')
    .select('id, numero, precios(*)')
    .eq('plantilla_id', plantillaId)
    .order('orden');

  if (productosRes.error || !productosRes.data) {
    showStatus('❌', 'Error al cargar productos');
    return;
  }

  productosRes.data.forEach(function(producto) {
    var precio = producto.precios.find(function(p) { return p.sucursal_id === sucursalId; }) || {};
    var els = document.querySelectorAll('[data-producto="' + producto.numero + '"]');
    els.forEach(function(el) {
      el.dataset.productoId = producto.id;
      var field = el.dataset.field;
      var val = precio[field];
      if (val !== null && val !== undefined) {
        el.querySelector('.val').textContent = formatPrice(val);
      }
    });
  });

  var upgradesRes = await db
    .from('upgrades')
    .select('*')
    .eq('plantilla_id', plantillaId)
    .eq('sucursal_id', sucursalId)
    .order('orden');

  if (upgradesRes.data && upgradesRes.data.length > 0) {
    upgradesRes.data.forEach(function(u, i) {
      var key = i === 0 ? 'mediano' : 'grande';
      var el = document.querySelector('[data-upgrade="' + key + '"]');
      if (el) {
        el.dataset.upgradeId = u.id;
        el.querySelector('.val').textContent = formatPrice(u.precio);
      }
    });
  }

  db.channel('precios-' + sucursalSlug)
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'precios', filter: 'sucursal_id=eq.' + sucursalId }, handlePriceUpdate)
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'upgrades', filter: 'sucursal_id=eq.' + sucursalId }, handleUpgradeUpdate)
    .subscribe();

  hideStatus();
}

init();
</script>
</body>
</html>
