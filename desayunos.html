<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desayunos</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 1080px;
  height: 1920px;
  overflow: hidden;
  font-family: 'Oswald', 'Arial Black', sans-serif;
}

body {
  display: flex;
  flex-direction: column;
  background: #ffffff;
}

/* HEADER PRINCIPAL — solo DESAYUNOS */
header {
  width: 1080px;
  height: 140px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background-color: #2a2a2a;
  background-image: url('img/bg-dark.jpg');
  background-size: cover;
  background-position: center;
}

header h1 {
  font-size: 96px;
  color: #ffffff;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  font-weight: 700;
  text-shadow: 0 2px 12px rgba(255,215,0,0.2), 0 2px 4px rgba(0,0,0,0.9);
  line-height: 1;
}

header h1::before,
header h1::after {
  content: '\2605';
  margin: 0 0.2em;
  font-size: 0.5em;
  color: #ffd700;
  vertical-align: middle;
}

/* HEADER SECCIÓN BISCUITS — fondo gris claro textura, tipografía especial */
.section-header-biscuits {
  width: 1080px;
  height: 160px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background-color: #d0c8c0;
  background-image: url('img/bg-light.jpg');
  background-size: cover;
  background-position: center;
}

.section-header-biscuits .script {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 52px;
  color: #1a1a1a;
  line-height: 1;
  font-weight: 700;
}

.section-header-biscuits .bold {
  font-family: 'Oswald', sans-serif;
  font-size: 88px;
  font-weight: 700;
  color: #1a1a1a;
  text-transform: uppercase;
  line-height: 1;
  letter-spacing: 0.04em;
}

/* GRID BISCUITS — fondo blanco, 2x2 */
#grid-biscuits {
  width: 1080px;
  height: 720px;
  flex-shrink: 0;
  display: grid;
  grid-template-columns: 540px 540px;
  grid-template-rows: 360px 360px;
  background: #ffffff;
}

/* SEPARADOR OSCURO entre secciones */
.section-divider {
  width: 1080px;
  height: 24px;
  flex-shrink: 0;
  background-color: #3a3530;
}

/* HEADER SECCIONES BURGERS Y BURRITOS — solo texto, sin fondo especial */
.section-header-dark {
  width: 1080px;
  height: 0px;
  flex-shrink: 0;
}

/* GRID BURGERS — fondo madera, 1 fila */
#grid-burgers {
  width: 1080px;
  height: 380px;
  flex-shrink: 0;
  display: grid;
  grid-template-columns: 540px 540px;
  grid-template-rows: 380px;
  background-color: #d0c8c0;
  background-image: url('img/bg-light.jpg');
  background-size: cover;
  background-position: center;
}

/* SEPARADOR entre burgers y burritos */
.section-divider-label {
  width: 1080px;
  height: 48px;
  flex-shrink: 0;
  background-color: #3a3530;
  display: flex;
  align-items: center;
  justify-content: center;
}

.section-divider-label span {
  font-size: 26px;
  font-weight: 700;
  color: #ffffff;
  text-transform: uppercase;
  letter-spacing: 0.12em;
}

/* GRID BURRITOS — fondo madera, 1 fila */
#grid-burritos {
  width: 1080px;
  height: 380px;
  flex-shrink: 0;
  display: grid;
  grid-template-columns: 540px 540px;
  grid-template-rows: 380px;
  background-color: #d0c8c0;
  background-image: url('img/bg-light.jpg');
  background-size: cover;
  background-position: center;
}

/* PRODUCTO */
.product {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding: 10px 28px 18px;
  overflow: hidden;
  border-right: 1px solid rgba(0,0,0,0.08);
  border-bottom: 1px solid rgba(0,0,0,0.08);
}

.product:nth-child(even) {
  border-right: none;
}

.product-image {
  flex: 1;
  width: 85%;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  min-height: 0;
}

.product-image img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  display: block;
  filter: drop-shadow(0 4px 16px rgba(0,0,0,0.2));
}

.product-info {
  flex-shrink: 0;
  width: 100%;
  display: flex;
  flex-direction: row;
  align-items: flex-end;
  justify-content: space-between;
  gap: 8px;
  padding-top: 8px;
}

.product-name-block {
  flex: 1;
  min-width: 0;
}

.product-name {
  font-size: 36px;
  font-weight: 700;
  line-height: 1.05;
  color: #1a1a1a;
}

.product-subtitle {
  font-size: 20px;
  color: #555555;
  font-weight: 400;
  font-style: italic;
  line-height: 1.2;
}

.prices {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 0;
}

.price-item {
  display: flex;
  align-items: baseline;
  gap: 3px;
  justify-content: flex-end;
}

.price-label {
  font-size: 15px;
  color: #1a1a1a;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 700;
}

.price-value {
  font-size: 56px;
  font-weight: 700;
  line-height: 1;
  color: #1a1a1a;
}

.price-currency {
  font-size: 26px;
  vertical-align: super;
  margin-right: 1px;
}

/* FOOTER */
footer {
  width: 1080px;
  height: 68px;
  flex-shrink: 0;
  background: #ffc82c;
  padding: 0 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.footer-left {
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.footer-combos-title {
  font-size: 22px;
  font-weight: 900;
  color: #1a1a1a;
  text-transform: uppercase;
  line-height: 1;
}

.footer-combos-subtitle {
  font-size: 18px;
  font-weight: 600;
  color: #1a1a1a;
  line-height: 1.2;
}

.footer-note {
  font-size: 10px;
  color: #444444;
  text-transform: uppercase;
  letter-spacing: 0.03em;
  font-weight: 400;
}

.footer-right {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 16px;
}

.footer-hbn-title {
  font-size: 22px;
  font-weight: 700;
  color: #1a1a1a;
  text-transform: uppercase;
  line-height: 1;
  text-align: right;
}

.footer-hbn-sub {
  font-size: 11px;
  color: #444444;
  font-weight: 400;
  text-align: right;
}

.footer-hbn-price {
  font-size: 52px;
  font-weight: 700;
  color: #1a1a1a;
  line-height: 1;
}

.footer-hbn-currency {
  font-size: 26px;
  vertical-align: super;
}

#status {
  display: none;
  position: fixed;
  inset: 0;
  background: #3b3b3b;
  color: #ffffff;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2vh;
  font-size: 28px;
  padding: 80px;
  text-align: center;
  z-index: 100;
}

.status-icon { font-size: 3em; }

@keyframes price-flash {
  0% { color: #ac0d24; transform: scale(1.2); }
  100% { color: #1a1a1a; transform: scale(1); }
}

.flash { animation: price-flash 0.6s ease-out; }
</style>
</head>
<body>

<header>
  <h1 id="menu-title">Cargando...</h1>
</header>

<div class="section-header-biscuits">
  <div class="script">Made From Scratch</div>
  <div class="bold">BISCUITS</div>
</div>

<div id="grid-biscuits"></div>

<div class="section-divider-label">
  <span>BURGERS &amp; SANDWICHES</span>
</div>
<div id="grid-burgers"></div>

<div class="section-divider-label">
  <span>BURRITOS</span>
</div>
<div id="grid-burritos"></div>

<footer>
  <div class="footer-left">
    <div class="footer-combos-title">LOS COMBOS INCLUYEN</div>
    <div class="footer-combos-subtitle">Hash Brown Nuggets y Café</div>
    <div class="footer-note">HASH BROWN NUGGETS = 105 GR., CAFÉ = 590 ML.</div>
  </div>
  <div class="footer-right" id="hbn-precio">
    <div>
      <div class="footer-hbn-title">Hash Brown Nuggets</div>
      <div class="footer-hbn-sub">105 gr</div>
    </div>
    <div class="footer-hbn-price" data-field="burger" data-producto-id=""><span class="footer-hbn-currency">$</span><span id="hbn-valor">40</span></div>
  </div>
</footer>

<div id="status">
  <div class="status-icon"></div>
  <div id="status-message">Conectando...</div>
</div>

<script>
var CONFIG = {
  url: 'https://gbklqpbcllhdixiuxwzt.supabase.co',
  key: 'sb_publishable_478TOeFf5POv09rZ58BeyQ_BA8rY8cf'
};

var SECCIONES = {
  biscuits: { gridId: 'grid-biscuits', numeros: [1, 2, 3, 4], labelPrecio: 'Biscuit' },
  burgers:  { gridId: 'grid-burgers',  numeros: [5, 6],       labelPrecio: { 5: 'Burger', 6: 'Sandwich' } },
  burritos: { gridId: 'grid-burritos', numeros: [7, 8],       labelPrecio: 'Burrito' }
};

var HBN_NUMERO = 9;

var params = new URLSearchParams(window.location.search);
var sucursalSlug = params.get('sucursal');
var plantillaSlug = params.get('plantilla');

var db = supabase.createClient(CONFIG.url, CONFIG.key);

function formatPrice(value) {
  if (value === null || value === undefined) return null;
  var num = parseFloat(value);
  return Number.isInteger(num) ? num.toString() : num.toFixed(2);
}

function showStatus(icon, message) {
  var el = document.getElementById('status');
  el.style.display = 'flex';
  el.querySelector('.status-icon').textContent = icon;
  el.querySelector('#status-message').textContent = message;
}

function hideStatus() {
  document.getElementById('status').style.display = 'none';
}

function getLabelPrecio(seccion, numero) {
  if (typeof seccion.labelPrecio === 'object') {
    return seccion.labelPrecio[numero] || 'Precio';
  }
  return seccion.labelPrecio;
}

function buildPriceHTML(label, value, field) {
  if (value === null || value === undefined) return '';
  return '<div class="price-item">' +
    '<span class="price-label">' + label + '</span>' +
    '<span class="price-value" data-field="' + field + '"><span class="price-currency">$</span>' + formatPrice(value) + '</span>' +
  '</div>';
}

function renderProduct(producto, precio, seccion) {
  var card = document.createElement('div');
  card.className = 'product';
  card.dataset.productoId = producto.id;

  var label = getLabelPrecio(seccion, producto.numero);

  var imageHTML = '';
  if (producto.imagen_url) {
    imageHTML = '<div class="product-image"><img src="' + producto.imagen_url + '" alt="' + producto.nombre + '"></div>';
  }

  var precioBase = buildPriceHTML(label, precio.burger, 'burger');
  var precioCombo = buildPriceHTML('Combo', precio.combo, 'combo');

  card.innerHTML =
    imageHTML +
    '<div class="product-info">' +
      '<div class="product-name-block">' +
        '<div class="product-name">' + producto.nombre + '</div>' +
        (producto.subtitulo ? '<div class="product-subtitle">' + producto.subtitulo + '</div>' : '') +
      '</div>' +
      '<div class="prices">' + precioBase + precioCombo + '</div>' +
    '</div>';

  return card;
}

function handlePriceUpdate(payload) {
  var row = payload.new;

  var hbnPriceEl = document.querySelector('#hbn-precio [data-producto-id="' + row.producto_id + '"]');
  if (hbnPriceEl) {
    var formatted = formatPrice(row.burger);
    if (formatted !== null) {
      document.getElementById('hbn-valor').textContent = formatted;
      hbnPriceEl.classList.remove('flash');
      void hbnPriceEl.offsetWidth;
      hbnPriceEl.classList.add('flash');
    }
  }

  var card = document.querySelector('.product[data-producto-id="' + row.producto_id + '"]');
  if (!card) return;

  ['burger', 'combo'].forEach(function(field) {
    var el = card.querySelector('[data-field="' + field + '"]');
    if (!el || row[field] === undefined) return;
    var formatted = formatPrice(row[field]);
    if (formatted === null) return;
    var currentText = el.textContent.replace('$', '').trim();
    if (currentText === formatted) return;
    el.innerHTML = '<span class="price-currency">$</span>' + formatted;
    el.classList.remove('flash');
    void el.offsetWidth;
    el.classList.add('flash');
  });
}

async function init() {
  if (!sucursalSlug || !plantillaSlug) {
    showStatus('⚠️', 'URL incompleta. Formato: ?sucursal=SLUG&plantilla=SLUG');
    return;
  }

  showStatus('📡', 'Conectando...');

  var sucursalRes = await db.from('sucursales').select('id').eq('slug', sucursalSlug).single();
  if (sucursalRes.error || !sucursalRes.data) {
    showStatus('❌', 'Sucursal "' + sucursalSlug + '" no encontrada');
    return;
  }
  var sucursalId = sucursalRes.data.id;

  var plantillaRes = await db.from('plantillas').select('id, nombre, descripcion').eq('slug', plantillaSlug).single();
  if (plantillaRes.error || !plantillaRes.data) {
    showStatus('❌', 'Plantilla "' + plantillaSlug + '" no encontrada');
    return;
  }
  var plantilla = plantillaRes.data;

  document.getElementById('menu-title').textContent = plantilla.nombre;
  document.title = plantilla.nombre + ' — ' + sucursalSlug;

  var productosRes = await db
    .from('productos')
    .select('*, precios(*)')
    .eq('plantilla_id', plantilla.id)
    .order('orden');

  if (productosRes.error || !productosRes.data) {
    showStatus('❌', 'Error al cargar productos');
    return;
  }

  var productos = productosRes.data;

  Object.keys(SECCIONES).forEach(function(key) {
    var seccion = SECCIONES[key];
    var grid = document.getElementById(seccion.gridId);
    seccion.numeros.forEach(function(num) {
      var producto = productos.find(function(p) { return p.numero === num; });
      if (!producto) return;
      var precio = producto.precios.find(function(p) { return p.sucursal_id === sucursalId; }) || {};
      grid.appendChild(renderProduct(producto, precio, seccion));
    });
  });

  var hbn = productos.find(function(p) { return p.numero === HBN_NUMERO; });
  if (hbn) {
    var hbnPrecio = hbn.precios.find(function(p) { return p.sucursal_id === sucursalId; }) || {};
    var hbnPriceEl = document.querySelector('#hbn-precio [data-field="burger"]');
    if (hbnPriceEl && hbnPrecio.burger !== null) {
      hbnPriceEl.dataset.productoId = hbn.id;
      document.getElementById('hbn-valor').textContent = formatPrice(hbnPrecio.burger);
    }
  }

  db.channel('precios-' + sucursalSlug)
    .on('postgres_changes', {
      event: 'UPDATE',
      schema: 'public',
      table: 'precios',
      filter: 'sucursal_id=eq.' + sucursalId
    }, handlePriceUpdate)
    .subscribe();

  hideStatus();
}

init();
</script>
</body>
</html>
