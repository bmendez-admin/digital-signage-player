<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Signage Player</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: 'Oswald', 'Arial Black', sans-serif;
}

body {
  display: flex;
  flex-direction: column;
  background: #3b3b3b;
}

header {
  text-align: center;
  padding: 2vh 2vw 1.2vh;
  flex-shrink: 0;
  background-color: #2a2a2a;
  background-image: url('img/bg-dark.jpg');
  background-size: cover;
  background-position: center;
}

header h1 {
  font-size: clamp(80px, 5.5vw, 86px);
  color: #ffffff;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  font-weight: 700;
  text-shadow: 0 2px 12px rgba(255,215,0,0.2), 0 2px 4px rgba(0,0,0,0.9);
  line-height: 1;
}

header h1::before,
header h1::after {
  content: '\2605';
  margin: 0 0.2em;
  font-size: 0.55em;
  color: #ffd700;
  vertical-align: middle;
}

header p {
  font-size: clamp(15px, 1.1vw, 16px);
  color: #e0e0e0;
  margin-top: 0.3vh;
  letter-spacing: 0.06em;
  font-weight: 400;
  text-transform: uppercase;
  text-shadow: 0 1px 3px rgba(0,0,0,0.9);
}

#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  background-color: #d0c8c0;
  background-image: url('img/bg-light.jpg');
  background-size: cover;
  background-position: center;
  min-height: 0;
}

#grid {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr 1fr;
  gap: 0;
  padding: 0;
  min-height: 0;
}

.product {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  position: relative;
  padding: 0.5vh 2% 0.5vh;
  min-height: 0;
  overflow: hidden;
}

.product-number {
  position: absolute;
  top: 0.8vh;
  left: 3%;
  width: clamp(70px, 3.2vw, 54px);
  height: clamp(70px, 3.2vw, 54px);
  background: #ffd700;
  color: #1a1a1a;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(30px, 1.6vw, 28px);
  font-weight: 700;
  z-index: 2;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
}

.product-image {
  flex: 1;
  width: 70%;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 0;
}

.product-image img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  display: block;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
}

.product-info {
  flex-shrink: 0;
  text-align: center;
  width: 100%;
}

.product-name {
  font-size: clamp(45px, 2.8vw, 46px);
  font-weight: 700;
  text-align: center;
  line-height: 1.05;
  color: #1a1a1a;
  text-shadow: 0 1px 2px rgba(255,255,255,0.3);
}

.product-subtitle {
  font-size: clamp(25px, 1vw, 16px);
  color: #444444;
  font-weight: 400;
  font-style: italic;
  text-align: center;
  margin-bottom: 0.2vh;
}

.prices {
  display: grid;
  gap: 0;
  width: 100%;
}

.prices.cols-2 {
  grid-template-columns: 1fr 1fr;
}

.prices.cols-1 {
  grid-template-columns: 1fr;
  max-width: 50%;
  margin: 0 auto;
}

.price-item {
  display: flex;
  align-items: baseline;
  justify-content: center;
  gap: 0.3vw;
  padding: 0.1vh 0;
}

.price-label {
  font-size: clamp(18px, 0.75vw, 12px);
  color: #000000;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-weight: 700;
}

.price-value {
  font-size: clamp(30px, 3vw, 50px);
  font-weight: 700;
  line-height: 1;
  display: inline-block;
  color: #1a1a1a;
}

.price-currency {
  font-size: 1.25rem;
  vertical-align: super;
  margin-right: 1px;
}

.note-bar {
  flex-shrink: 0;
  text-align: center;
  padding: 0.3vh 2vw;
  font-size: clamp(12px, 0.6vw, 10px);
  color: #000000;
  letter-spacing: 0.04em;
  font-weight: 400;
}

footer {
  flex-shrink: 0;
  background: rgba(255,255,255,0.92);
  padding: 1vh 3vw;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 2.5vw;
  border-top: 3px solid #ac0d24;
}

.upgrade-title {
  font-size: clamp(30px, 2.5vw, 42px);
  text-transform: uppercase;
  color: #1a1a1a;
  font-weight: 900;
}

.upgrade-title em {
  color: #ac0d24;
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-weight: 900;
}

.upgrade-option {
  text-align: center;
}

.upgrade-label {
  font-size: clamp(18px, 0.9vw, 14px);
  color: #000000;
  text-transform: uppercase;
  font-weight: 600;
  letter-spacing: 0.05em;
}

.upgrade-price {
  font-size: clamp(30px, 2.8vw, 46px);
  font-weight: 700;
  color: #1a1a1a;
}

.upgrade-currency {
  font-size: 1.25rem;
  vertical-align: super;
}

#status {
  display: none;
  position: fixed;
  inset: 0;
  background: #3b3b3b;
  color: #ffffff;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2vh;
  font-size: clamp(14px, 2vw, 28px);
  padding: 5vw;
  text-align: center;
  z-index: 100;
}

.status-icon { font-size: 3em; }

@keyframes price-flash {
  0% { color: #ac0d24; transform: scale(1.2); }
  100% { color: #1a1a1a; transform: scale(1); }
}

.flash { animation: price-flash 0.6s ease-out; }
</style>
</head>
<body>

<header>
  <h1 id="menu-title">Cargando...</h1>
  <p id="menu-subtitle"></p>
</header>

<div id="main">
  <div id="grid"></div>
  <div class="note-bar">1/3 LB. = 150 GR., LA VERSIÓN DOBLE INCLUYE 2 PIEZAS DE 1/3 DE LB. Y DOS REBANADAS DE QUESO.</div>
  <footer id="upgrades"></footer>
</div>

<div id="status">
  <div class="status-icon"></div>
  <div id="status-message">Conectando...</div>
</div>

<script>
var CONFIG = {
  url: 'https://gbklqpbcllhdixiuxwzt.supabase.co',
  key: 'sb_publishable_478TOeFf5POv09rZ58BeyQ_BA8rY8cf'
};

var params = new URLSearchParams(window.location.search);
var sucursalSlug = params.get('sucursal');
var plantillaSlug = params.get('plantilla');

var db = supabase.createClient(CONFIG.url, CONFIG.key);

function formatPrice(value) {
  if (value === null || value === undefined) return null;
  var num = parseFloat(value);
  return Number.isInteger(num) ? num.toString() : num.toFixed(2);
}

function showStatus(icon, message) {
  var el = document.getElementById('status');
  el.style.display = 'flex';
  el.querySelector('.status-icon').textContent = icon;
  el.querySelector('#status-message').textContent = message;
}

function hideStatus() {
  document.getElementById('status').style.display = 'none';
}

function buildPriceHTML(label, value, field) {
  if (value === null || value === undefined) return '';
  return '<div class="price-item">' +
    '<span class="price-label">' + label + '</span> ' +
    '<span class="price-value" data-field="' + field + '"><span class="price-currency">$</span>' + formatPrice(value) + '</span>' +
  '</div>';
}

function renderProduct(producto, sucursalId) {
  var precio = producto.precios.find(function(p) { return p.sucursal_id === sucursalId; }) || {};
  var card = document.createElement('div');
  card.className = 'product';
  card.dataset.productoId = producto.id;

  var variants = [
    { key: 'burger', label: 'Burger' },
    { key: 'doble', label: 'Doble' },
    { key: 'combo', label: 'Combo' },
    { key: 'combo_doble', label: 'Combo' }
  ];

  var activePrices = variants
    .map(function(v) { return buildPriceHTML(v.label, precio[v.key], v.key); })
    .filter(function(html) { return html !== ''; });

  var colsClass = activePrices.length <= 2 ? 'cols-1' : 'cols-2';

  var imageHTML = '';
  if (producto.imagen_url) {
    imageHTML = '<div class="product-image"><img src="' + producto.imagen_url + '" alt="' + producto.nombre + '"></div>';
  }

  card.innerHTML =
    '<div class="product-number">' + producto.numero + '</div>' +
    imageHTML +
    '<div class="product-info">' +
      '<div class="product-name">' + producto.nombre + '</div>' +
      '<div class="product-subtitle">' + producto.subtitulo + '</div>' +
      '<div class="prices ' + colsClass + '">' + activePrices.join('') + '</div>' +
    '</div>';

  return card;
}

function renderUpgrades(upgrades) {
  var footer = document.getElementById('upgrades');
  var html = '<div class="upgrade-title"><em>Agranda</em> TU COMBO</div>';

  upgrades.forEach(function(u) {
    html +=
      '<div class="upgrade-option" data-upgrade-id="' + u.id + '">' +
        '<div class="upgrade-label">' + u.nombre + '</div>' +
        '<div class="upgrade-price"><span class="upgrade-currency">$</span>' + formatPrice(u.precio) + '</div>' +
      '</div>';
  });

  footer.innerHTML = html;
}

function handlePriceUpdate(payload) {
  var row = payload.new;
  var card = document.querySelector('[data-producto-id="' + row.producto_id + '"]');
  if (!card) return;

  ['burger', 'doble', 'combo', 'combo_doble'].forEach(function(field) {
    var el = card.querySelector('[data-field="' + field + '"]');
    if (!el || row[field] === undefined) return;

    var formatted = formatPrice(row[field]);
    if (formatted === null) return;

    var currentText = el.textContent.replace('$', '').trim();
    if (currentText === formatted) return;

    el.innerHTML = '<span class="price-currency">$</span>' + formatted;
    el.classList.remove('flash');
    void el.offsetWidth;
    el.classList.add('flash');
  });
}

async function init() {
  if (!sucursalSlug || !plantillaSlug) {
    showStatus('\u26A0\uFE0F', 'URL incompleta. Formato: ?sucursal=SLUG&plantilla=SLUG');
    return;
  }

  showStatus('\uD83D\uDCE1', 'Conectando...');

  var sucursalRes = await db.from('sucursales').select('id').eq('slug', sucursalSlug).single();
  if (sucursalRes.error || !sucursalRes.data) {
    showStatus('\u274C', 'Sucursal "' + sucursalSlug + '" no encontrada');
    return;
  }
  var sucursalId = sucursalRes.data.id;

  var plantillaRes = await db.from('plantillas').select('id, nombre, descripcion').eq('slug', plantillaSlug).single();
  if (plantillaRes.error || !plantillaRes.data) {
    showStatus('\u274C', 'Plantilla "' + plantillaSlug + '" no encontrada');
    return;
  }
  var plantilla = plantillaRes.data;

  document.getElementById('menu-title').textContent = plantilla.nombre;
  document.getElementById('menu-subtitle').textContent = plantilla.descripcion || '';
  document.title = plantilla.nombre + ' \u2014 ' + sucursalSlug;

  var productosRes = await db
    .from('productos')
    .select('*, precios(*)')
    .eq('plantilla_id', plantilla.id)
    .order('orden');

  if (productosRes.error || !productosRes.data) {
    showStatus('\u274C', 'Error al cargar productos');
    return;
  }

  var grid = document.getElementById('grid');
  productosRes.data.forEach(function(p) {
    grid.appendChild(renderProduct(p, sucursalId));
  });

  var upgradesRes = await db
    .from('upgrades')
    .select('*')
    .eq('plantilla_id', plantilla.id)
    .eq('sucursal_id', sucursalId)
    .order('orden');

  if (upgradesRes.data && upgradesRes.data.length > 0) {
    renderUpgrades(upgradesRes.data);
  }

  db.channel('precios-' + sucursalSlug)
    .on('postgres_changes', {
      event: 'UPDATE',
      schema: 'public',
      table: 'precios',
      filter: 'sucursal_id=eq.' + sucursalId
    }, handlePriceUpdate)
    .subscribe();

  hideStatus();
}

init();
</script>
</body>
</html>
